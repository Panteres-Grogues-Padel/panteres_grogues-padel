<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexión · Panteres Grogues Pàdel</title>
    <style>
      :root {
        --bg: #fdf6a0;
        --text: #0d1b3e;
        --card: #fefce8;
        --border: rgba(13, 27, 62, 0.2);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px;
        text-align: center;
      }
      h1 { font-size: 24px; margin: 0 0 10px; }
      p { margin: 0; line-height: 1.5; }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #c0392b;
        margin: 0 auto 12px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="dot"></div>
      <h1>Sin conexión</h1>
      <p>No hay internet en este momento. Revisa tu conexión y vuelve a intentarlo.</p>
    </main>
  </body>
</html>
